name: parallel-demo
workdir: /Users/riot/riot/codex-workflow-automation
run_root: .runs
start_at: fanout

codex:
  bin: codex
  approval: never
  sandbox: danger-full-access
  skip_git_repo_check: true

steps:
  fanout:
    parallel:
      - analyst_a
      - analyst_b
    join: merge

  analyst_a:
    prompt: |
      你是并行分析员 A。
      输出 success=true, next="__end__", worker="a"。
      只按 schema 输出。

  analyst_b:
    prompt: |
      你是并行分析员 B。
      输出 success=true, next="__end__", worker="b"。
      只按 schema 输出。

  merge:
    prompt: |
      你是汇总步骤。
      A 的输出 worker 是 {{ steps.analyst_a.output.worker }}。
      B 的输出 worker 是 {{ steps.analyst_b.output.worker }}。
      输出 success=true, next="__end__"。
      只按 schema 输出。
