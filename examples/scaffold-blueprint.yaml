name: sample-scaffold
template_type: multi-agent
workdir: /abs/path/to/your/project

control:
  enabled: true

shared:
  files:
    - id: handoff
      path: shared/handoff.md
      purpose: request-and-handoff

agents:
  - id: planner
    role: high-level planning and routing
    uses_memory: true
    uses_shared:
      - handoff
    next_options:
      - executor
      - finish

  - id: executor
    role: implementation and validation
    uses_memory: true
    uses_shared:
      - handoff
    next_options:
      - planner
      - finish

workflow:
  start_at: planner
  max_steps: 12
  run_root: .runs
