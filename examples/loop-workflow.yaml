name: loop-demo
workdir: /Users/riot/riot/codex-workflow-automation
run_root: .runs
start_at: review
max_steps: 6

codex:
  bin: codex
  approval: never
  sandbox: danger-full-access
  skip_git_repo_check: true

steps:
  review:
    prompt: |
      你是一个循环审查步骤。
      这是第 {{ current_step.attempt }} 次执行。
      如果当前次数小于 2，输出 success=true, next="retry"。
      否则输出 success=true, next="done"。
      只按 schema 输出。
    max_visits: 3
    branches:
      retry: review
      done: finish

  finish:
    prompt: |
      你是结束步骤。
      输出 success=true, next="__end__"。
      只按 schema 输出。
