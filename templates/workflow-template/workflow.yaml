name: my-workflow
template_type: multi-agent
workdir: /abs/path/to/your/project

control:
  enabled: true

shared:
  files:
    - id: handoff
      path: shared/handoff.md
      purpose: request-and-handoff

agents:
  - id: agent_a
    role: planning, analysis, or routing
    uses_memory: true
    uses_shared:
      - handoff
    next_options:
      - agent_b
      - finish
    prompt_path: prompts/agent-a.md
    memory_path: memory/agent-a.md
    output_schema_path: schemas/agent-a-output.json

  - id: agent_b
    role: execution, implementation, or validation
    uses_memory: true
    uses_shared:
      - handoff
    next_options:
      - agent_a
      - finish
    prompt_path: prompts/agent-b.md
    memory_path: memory/agent-b.md
    output_schema_path: schemas/agent-b-output.json

workflow:
  start_at: agent_a
  max_steps: 12
  run_root: .runs
